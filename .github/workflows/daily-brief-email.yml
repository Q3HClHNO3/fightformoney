name: Daily Brief Email

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      brief_file:
        description: "Markdown/text file to send"
        required: false
        default: "daily-brief.md"
      subject:
        description: "Email subject override"
        required: false
        default: ""
  schedule:
    # 13:45-14:30 Asia/Shanghai every day.
    # GitHub cron uses UTC. Multiple slots reduce missed/delayed scheduled runs.
    - cron: "45,50,55 5 * * *"
    - cron: "0,5,10,15,20,25,30 6 * * *"

permissions:
  contents: write

concurrency:
  group: daily-brief-email
  cancel-in-progress: false

jobs:
  send-email:
    name: Send QQ daily brief
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ github.event_name != 'push' || contains(github.event.head_commit.message, '[send-brief-now]') }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate daily investment report
        run: python scripts/generate_investment_report.py

      - name: Send brief through QQ SMTP
        env:
          SMTP_HOST: smtp.qq.com
          SMTP_PORT: "465"
          SMTP_USER: ${{ secrets.QQSMTPUSER }}
          SMTP_PASSWORD: ${{ secrets.QQSMTPAUTHCODE }}
          MAIL_TO: ${{ secrets.QQMAILTO }}
          MAIL_FROM: ${{ secrets.QQSMTPUSER }}
          MAIL_SUBJECT: ${{ github.event.inputs.subject }}
          BRIEF_FILE: ${{ github.event.inputs.brief_file || 'daily-brief.md' }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python scripts/send_daily_brief.py
